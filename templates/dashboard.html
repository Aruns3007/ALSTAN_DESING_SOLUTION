<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alstan Hub | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .stat-card {
            background: rgba(22, 27, 34, 0.6);
            border: 1px solid rgba(0, 209, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
        }
        .progress { height: 8px; background: #0d1117; }
        .progress-bar { background: var(--accent-blue); }
    </style>
</head>
<body class="bg-dark text-white">
    <nav class="navbar navbar-dark bg-transparent border-bottom border-white-10 p-3">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold">ALSTAN<span class="text-info">HUB</span></span>
            <a href="/logout" class="btn btn-outline-danger btn-sm rounded-pill">LOGOUT</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row mb-4">
            <div class="col-12">
                <h2 class="fw-bold">Welcome, Associate</h2>
                <p class="text-info text-mono" style="font-size: 0.8rem;">SYSTEM NODE: ACTIVE // CLEARANCE: LEVEL 1</p>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="stat-card">
                    <p class="text-mono small mb-2">VLSI Architecture</p>
                    <h3 class="fw-bold">85%</h3>
                    <div class="progress mt-3"><div class="progress-bar" style="width: 85%"></div></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <p class="text-mono small mb-2">Neural Linkage</p>
                    <h3 class="fw-bold">42%</h3>
                    <div class="progress mt-3"><div class="progress-bar" style="width: 42%"></div></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <p class="text-mono small mb-2">Cloud Nodes</p>
                    <h3 class="fw-bold">Active</h3>
                    <p class="text-success small mt-2">● 12ms Latency</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
