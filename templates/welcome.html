<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synchronization Complete | Alstandesign</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --accent: #00D1FF; --bg: #0b0e14; }
        body {
            background: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .success-icon {
            font-size: 4rem;
            color: var(--accent);
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .btn-entry {
            background: var(--accent);
            color: black;
            font-weight: bold;
            border-radius: 50px;
            padding: 12px 40px;
            margin-top: 30px;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }
        .btn-entry:hover { background: #fff; transform: translateY(-3px); }
    </style>
</head>
<body>
    <div>
        <div class="success-icon">✓</div>
        <h1 class="fw-bold">SYNCHRONIZATION COMPLETE</h1>
        <p class="text-white-50">Your identity has been securely linked to the Alstandesign Grid.</p>
        <p class="small text-info">2FA STATUS: ACTIVE // ENCRYPTED</p>
        
        <a href="/login" class="btn btn-entry">ENTER LABS</a>
    </div>
</body>
</html>
