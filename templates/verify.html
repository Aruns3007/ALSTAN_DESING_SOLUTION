<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Sync - AlstanDesign</title>
    <style>
        body { background: #0b0e14; color: white; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .otp-card { background: rgba(22, 27, 34, 0.8); border: 1px solid #00D1FF; padding: 40px; border-radius: 20px; text-align: center; max-width: 450px; box-shadow: 0 0 20px rgba(0, 209, 255, 0.2); }
        .qr-container { background: white; padding: 15px; border-radius: 10px; display: inline-block; margin-bottom: 20px; }
        .qr-container img { width: 200px; height: 200px; display: block; }
        .otp-input { background: #0d1117; border: 1px solid rgba(0, 209, 255, 0.3); color: #00D1FF; font-size: 1.5rem; text-align: center; letter-spacing: 5px; border-radius: 10px; margin-bottom: 20px; width: 100%; padding: 10px; box-sizing: border-box; }
        .btn-verify { background: #00D1FF; color: black; font-weight: bold; border-radius: 50px; width: 100%; padding: 15px; border: none; cursor: pointer; transition: 0.3s; }
        .btn-verify:hover { background: #008fb3; transform: scale(1.02); }
        p { color: rgba(255, 255, 255, 0.7); font-size: 0.9rem; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="otp-card">
        <h2 style="color: #00D1FF; margin-bottom: 10px;">SECURE SYNC</h2>
        <p>Scan this QR code with <b>Google Authenticator</b> to link your device.</p>
        
        <div class="qr-container">
            <img src="data:image/png;base64,{{ qr_code }}" alt="QR Code">
        </div>

        <form action="/verify/{{ username }}" method="POST">
            <input type="text" name="otp" class="otp-input" maxlength="6" placeholder="000 000" required autofocus>
            <button type="submit" class="btn-verify">AUTHORIZE DEVICE</button>
        </form>
    </div>
</body>
</html>
